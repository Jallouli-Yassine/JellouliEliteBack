spring.application.name=elite
### SERVER CONFIG ###
server.port=8081
server.servlet.context-path=/api

#configuration de la base de donnée
spring.datasource.url=${DB_URL:jdbc:mysql://localhost:3306/jelloulielite?createDatabaseIfNotExist=true}
spring.datasource.username=${DB_USERNAME:root}
spring.datasource.password=${DB_PASSWORD:}

#configuration de jpa/hibernate
spring.jpa.hibernate.ddl-auto=update

#bootstrap admin
app.bootstrap.admin.username=${ADMIN_USERNAME:admin}
app.bootstrap.admin.password=${ADMIN_PASSWORD:Admin@12345!}
app.bootstrap.admin.email=admin@demo.com
app.bootstrap.admin.phone=00000000
app.bootstrap.admin.first-name=Admin
app.bootstrap.admin.last-name=Demo


