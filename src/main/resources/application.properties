spring.application.name=elite
### SERVER CONFIG ###
server.port=8081
server.servlet.context-path=/api

#configuration de la base de donnée
spring.datasource.url=${DB_URL}
spring.datasource.username=${DB_USERNAME}
spring.datasource.password=${DB_PASSWORD}

#configuration de jpa/hibernate
spring.jpa.hibernate.ddl-auto=create-drop

#bootstrap admin
app.bootstrap.admin.username=${ADMIN_USERNAME}
app.bootstrap.admin.password=${ADMIN_PASSWORD}
app.bootstrap.admin.email=${ADMIN_EMAIL}
app.bootstrap.admin.phone=${ADMIN_PHONE}
app.bootstrap.admin.first-name=${ADMIN_FIRST_NAME}
app.bootstrap.admin.last-name=${ADMIN_LAST_NAME}

#SMTP Configuration
spring.mail.host=${MAIL_HOST}
spring.mail.port=${MAIL_PORT}
spring.mail.username=${MAIL_USERNAME}
spring.mail.password=${MAIL_PASSWORD}
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true
spring.mail.properties.mail.smtp.ssl.trust=smtp.gmail.com
app.mail.from=${MAIL_USERNAME}

#cloudinary (Utiliser des variables d'environnement au lieu de clés en dur)
cloudinary.cloud_name=${CLOUDINARY_NAME}
cloudinary.api_key=${CLOUDINARY_API_KEY}
cloudinary.api_secret=${CLOUDINARY_API_SECRET}

##security
jwt.expiration=${JWT_EXPIRATION}
jwt.secret=${JWT_SECRET}
